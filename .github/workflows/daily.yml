name: Daily Event Scraper

on:
  schedule:
    # Full daily sweep: every morning at 6:00 AM Pacific Time (13:00 UTC)
    - cron: '0 13 * * *'
    # Monthly audit: 1st of each month at 6:00 AM Pacific Time
    - cron: '0 13 1 * *'
  # Also allows you to run it manually from GitHub if needed
  workflow_dispatch:
    inputs:
      run_weekly_sweep:
        description: 'Run weekly event sweep'
        required: false
        default: 'false'
      run_monthly_audit:
        description: 'Run monthly recurring events audit'
        required: false
        default: 'false'

jobs:
  update-events:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      # Step 1: Check out your repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Step 3: Install dependencies
      - name: Install Python dependencies
        run: pip install openpyxl

      # Step 4: Run the daily scraper
      - name: Run daily scraper
        env:
          BIBLIOCOMMONS_API_KEY: ${{ secrets.BIBLIOCOMMONS_API_KEY }}
        run: python scraper.py

      # Step 5: Run full event sweep (every morning)
      - name: Run weekly event sweep
        if: github.event.schedule == '0 13 * * *' || github.event.inputs.run_weekly_sweep == 'true'
        run: python library_review.py --weekly-sweep

      # Step 6: Run monthly audit on the 1st of each month
      - name: Run monthly recurring events audit
        if: github.event.schedule == '0 13 1 * *' || github.event.inputs.run_monthly_audit == 'true'
        run: python library_review.py --monthly-audit

      # Step 7: Commit and push any changes back to GitHub
      - name: Commit updated files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Out AND About Marin Bot"
          git stash --include-untracked || true
          git pull --rebase origin main
          git stash pop || true
          git add events.json scraper_log.txt library_page_hashes.json weekly_sweep_report.json "weekly_sweep_*_review.xlsx" monthly_audit_report.json || true
          git diff --staged --quiet || git commit -m "Daily update: events refreshed $(date +'%Y-%m-%d')"
          git push
